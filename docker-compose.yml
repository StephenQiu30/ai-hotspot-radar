services:
  api:
    build:
      context: .
      dockerfile: infra/python/Dockerfile
    working_dir: /workspace
    command: ["uvicorn", "apps.api.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - path: ./infra/env/.env.example
      - path: ./infra/env/.env
        required: false
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://root:your-password@host.docker.internal:5432/ai_hotspot_radar}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: infra/node/Dockerfile
    working_dir: /workspace/apps/web
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0"]
    env_file:
      - path: ./infra/env/.env.example
      - path: ./infra/env/.env
        required: false
    depends_on:
      - api
    ports:
      - "3000:3000"

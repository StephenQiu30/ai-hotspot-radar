services:
  api:
    build:
      context: .
      dockerfile: infra/python/Dockerfile
    working_dir: /workspace
    command: ["uvicorn", "services.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      PYTHONPATH: /workspace
    ports:
      - "8000:8000"

  worker:
    profiles:
      - jobs
    build:
      context: .
      dockerfile: infra/python/Dockerfile
    working_dir: /workspace
    command: ["celery", "-A", "services.worker.app:celery_app", "worker", "--loglevel=INFO"]
    environment:
      PYTHONPATH: /workspace
    depends_on:
      - postgres
      - redis

  beat:
    profiles:
      - jobs
    build:
      context: .
      dockerfile: infra/python/Dockerfile
    working_dir: /workspace
    command: ["celery", "-A", "services.worker.app:celery_app", "beat", "--loglevel=INFO"]
    environment:
      PYTHONPATH: /workspace
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: infra/node/Dockerfile
    depends_on:
      - api
    ports:
      - "3000:3000"

  postgres:
    profiles:
      - jobs
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_hotspot_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    profiles:
      - jobs
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:

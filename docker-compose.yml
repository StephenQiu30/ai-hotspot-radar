services:
  api:
    build:
      context: .
      dockerfile: infra/python/Dockerfile
    working_dir: /workspace
    command: ["uvicorn", "apps.api.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - path: ./infra/env/.env.example
      - path: ./infra/env/.env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: infra/node/Dockerfile
    working_dir: /workspace/apps/web
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0"]
    env_file:
      - path: ./infra/env/.env.example
      - path: ./infra/env/.env
        required: false
    depends_on:
      - api
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_hotspot_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

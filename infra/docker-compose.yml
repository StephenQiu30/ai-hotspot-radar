services:
  api:
    build:
      context: ..
      dockerfile: infra/python/Dockerfile
    working_dir: /workspace
    command: ["uvicorn", "services.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - ./env/.env.example
    environment:
      PYTHONPATH: /workspace
    volumes:
      - ..:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: infra/python/Dockerfile
    working_dir: /workspace
    command: ["celery", "-A", "services.worker.app:celery_app", "worker", "--loglevel=INFO"]
    env_file:
      - ./env/.env.example
    environment:
      PYTHONPATH: /workspace
    volumes:
      - ..:/workspace
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: ..
      dockerfile: infra/python/Dockerfile
    working_dir: /workspace
    command: ["celery", "-A", "services.worker.app:celery_app", "beat", "--loglevel=INFO"]
    env_file:
      - ./env/.env.example
    environment:
      PYTHONPATH: /workspace
    volumes:
      - ..:/workspace
    depends_on:
      - redis

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: ["sh", "-lc", "echo 'web scaffold placeholder'; sleep infinity"]
    env_file:
      - ./env/.env.example
    volumes:
      - ..:/workspace

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_hotspot_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:

services:
  api:
    image: python:3.12-slim
    working_dir: /workspace
    command: ["sh", "-lc", "echo 'api scaffold placeholder'; sleep infinity"]
    env_file:
      - ./env/.env.example
    volumes:
      - ../services:/workspace/services
      - ../backend:/workspace/backend
      - ../contracts:/workspace/contracts
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.12-slim
    working_dir: /workspace
    command: ["sh", "-lc", "echo 'worker scaffold placeholder'; sleep infinity"]
    env_file:
      - ./env/.env.example
    volumes:
      - ../services:/workspace/services
      - ../backend:/workspace/backend
      - ../contracts:/workspace/contracts
    depends_on:
      - postgres
      - redis

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: ["sh", "-lc", "echo 'web scaffold placeholder'; sleep infinity"]
    env_file:
      - ./env/.env.example
    volumes:
      - ../frontend:/workspace/frontend
      - ../contracts:/workspace/contracts

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_hotspot_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:

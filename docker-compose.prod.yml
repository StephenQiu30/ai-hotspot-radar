services:
  api:
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}

  web:
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      NEXT_PUBLIC_API_BASE_URL: /

  nginx:
    environment:
      APP_ENV: production
    ports:
      - "80:80"
